name: Unified MLOps & LLMOps Automation

on:
  push:
    branches:
      - main  # Adjust to your deployment branch name

jobs:
  mlops-build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'ml-service/') || contains(github.event.head_commit.modified, 'k8s/inference.yaml')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: Run Existing Classic MLOps Pipeline Tasks
        run: |
          echo "Executing your existing model preparation, packaging, or registry workflows..."

  llmops-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Check for LLM Service Mutations
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            llm_core:
              - 'llm-service/**'
              - 'k8s/llm-agent.yaml'

      - name: Setup Docker Buildx
        if: steps.filter.outputs.llm_core == 'true'
        uses: docker/setup-buildx-action@v2

      - name: Access Registry
        if: steps.filter.outputs.llm_core == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construct and Distribute Agent Image
        if: steps.filter.outputs.llm_core == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./llm-service
          push: true
          tags: your-dockerhub-username/rag-langgraph-agent:latest