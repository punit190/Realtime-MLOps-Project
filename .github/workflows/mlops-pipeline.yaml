name: MLOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: churn-model-bucket-cicd-mlops

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: cicd

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate dataset
      run: |
        mkdir -p data
        python generate_data.py

    - name: Train model
      run: |
        mkdir -p models
        python train.py

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Push model to S3 directly
      run: |
        aws s3 cp models/churn_model.pkl s3://${{ env.S3_BUCKET }}/models/churn_model.pkl
        echo "Model pushed to S3 is success"

    - name: Update inference.yaml with S3 model path
      run: |
        MODEL_URI="s3://${{ env.S3_BUCKET }}/models/churn_model.pkl"
        sed -i "s|storageUri: .*|storageUri: $MODEL_URI|g" k8s/inference.yaml

    - name: Commit updated inference.yaml
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add k8s/inference.yaml
        git commit -m "Update model S3 path [skip ci]" || echo "No changes"
        git push origin HEAD:cicd || echo "No changes to push"
