name: Unified MLOps & LLMOps Automation

on:
  push:
    branches:
      - llmops

permissions:
  contents: write  # Crucial to allow GitHub Actions to commit changes back to your repo

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: churn-model-bucket-cicd-mlops

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # --- START OF ACTUAL MODEL TRAINING STEPS ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate dataset
        run: |
          mkdir -p data
          python generate_data.py

      - name: Train model
        run: |
          mkdir -p models
          python train.py

      # --- START OF ARTIFACT DEPLOYMENT & GITOPS ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 1. Pushes the dynamically created .pkl file to a unique versioned folder in S3
      - name: Deploy Model Artifact to S3
        run: |
          echo "Uploading trained pickle model to S3..."
          aws s3 cp models/churn_model.pkl s3://${{ env.S3_BUCKET }}/models/v_${{ github.sha }}/churn_model.pkl

      # 2. Automatically updates the inference.yaml with the unique S3 model folder path
      - name: Update KServe Storage URI
        run: |
          sed -i "s|storageUri:.*|storageUri: \"s3://${{ env.S3_BUCKET }}/models/v_${{ github.sha }}/\"|g" k8s/inference.yaml

      # 3. Pushes manifest updates back to Git so ArgoCD triggers an automatic sync
      - name: Commit and Push MLOps Manifest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/inference.yaml
          git commit -m "chore(mlops): deploy model version v_${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push

  llmops-pipeline:
    runs-on: ubuntu-latest
    needs: mlops-pipeline # <--- Strictly forces LLMOps to wait until MLOps finishes training and pushing
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # CRUCIAL: Pull the MLOps manifest changes into this runner before executing Docker tasks
      - name: Pull Latest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin llmops

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Access Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io # <--- Explicitly state Docker Hub registry
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Builds and distributes the container using the unique commit hash
      - name: Construct and Distribute Agent Image
        uses: docker/build-push-action@v6
        with:
          context: ./llm-service
          push: true
          tags: punit19/rag-langgraph-agent:${{ github.sha }}

      # 2. Automatically updates the llm-agent.yaml file with the specific image tag
      - name: Update K8s Manifest Image Tag
        run: |
          sed -i "s|image: punit19/rag-langgraph-agent:.*|image: punit19/rag-langgraph-agent:${{ github.sha }}|g" k8s/llm-agent.yaml

      # 3. Pushes manifest updates back to Git to complete the GitOps sync loop
      - name: Commit and Push LLMOps Manifest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/llm-agent.yaml
          git commit -m "chore(llmops): bump agent image tag to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
